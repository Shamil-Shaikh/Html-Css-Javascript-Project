<!DOCTYPE html>
<html>
<head>
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Kanban Board 🚀</h1>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<div class="board">
  <div class="column" ondrop="drop(event, 'todo')" ondragover="allowDrop(event)">
    <h2>To Do</h2>
    <div id="todo"></div>
  </div>

  <div class="column" ondrop="drop(event, 'progress')" ondragover="allowDrop(event)">
    <h2>In Progress</h2>
    <div id="progress"></div>
  </div>

  <div class="column" ondrop="drop(event, 'done')" ondragover="allowDrop(event)">
    <h2>Done</h2>
    <div id="done"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
